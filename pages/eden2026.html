function addSurprise() {

}

// --- Web Audio --
let Ctx = null;
let fmOn = false;
let masterGain = null;

function toggleFM() {
  if (fmOn) {
    // on-off togglr
    masterGain.gain.linearRampToValueAtTime(0, Ctx.currentTime + 3);
    setTimeout(() => { Ctx.close(); Ctx = null; fmOn = false; }, 3100);
    return;
  }

  const AudioContext = window.AudioContext || window.webkitAudioContext;
  Ctx = new AudioContext();
  fmOn = true;

  // Carrier 
  const carrier = Ctx.createOscillator();
  carrier.type = 'sine';
  carrier.frequency.setValueAtTime(261.63, Ctx.currentTime); 
  carrier.frequency.linearRampToValueAtTime(130.81, Ctx.currentTime + 24);

  // modulateur 
  const modulateur = Ctx.createOscillator();
  modulateur.type = 'sine';
  modulateur.frequency.setValueAtTime(0.001, Ctx.currentTime);
  modulateur.frequency.linearRampToValueAtTime(195, Ctx.currentTime + 26);

  // depth
  const depth = Ctx.createGain();
  depth.gain.value = 65; 

  //gain
  masterGain = Ctx.createGain();
  masterGain.gain.setValueAtTime(0, Ctx.currentTime);
  masterGain.gain.linearRampToValueAtTime(0.55, Ctx.currentTime + 4);


  const feedbackGain = Ctx.createGain();
  feedbackGain.gain.value = 0.0155;

  modulateur.connect(depth);
  depth.connect(carrier.frequency);
  carrier.connect(masterGain);
  masterGain.connect(Ctx.destination);


  modulateur.start();
  carrier.start();
  };
